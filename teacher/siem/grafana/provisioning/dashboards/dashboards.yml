# Auto-load any JSON in /var/lib/grafana/dashboards/ as a Grafana dashboard.
apiVersion: 1

providers:
  - name: OTLab Classroom
    orgId: 1
    folder: OTLab
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: true
