# OTLab — Loki config for the classroom SIEM.
# Sized for ~20 students × ~5 log streams each = ~100 active streams,
# light volume. Filesystem chunks (BoltDB shipper). No object store
# required. Retention default: 7 days (overridable per cohort).

auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: info

common:
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory:  /loki/rules
  replication_factor: 1
  ring:
    instance_addr: 127.0.0.1
    kvstore:
      store: inmemory

query_range:
  results_cache:
    cache:
      embedded_cache:
        enabled: true
        max_size_mb: 100

schema_config:
  configs:
    - from: 2024-01-01
      store: boltdb-shipper
      object_store: filesystem
      schema: v12
      index:
        prefix: index_
        period: 24h

storage_config:
  boltdb_shipper:
    active_index_directory: /loki/index
    cache_location:         /loki/index_cache
    shared_store:           filesystem
  filesystem:
    directory: /loki/chunks

# Retention — 7 days default. Bump to 30d for a multi-day event;
# drop to 24h for one-off demos.
limits_config:
  reject_old_samples: true
  reject_old_samples_max_age: 168h
  retention_period: 168h
  max_query_length: 721h
  max_query_parallelism: 32
  ingestion_rate_mb: 16
  ingestion_burst_size_mb: 32

compactor:
  working_directory: /loki/compactor
  shared_store: filesystem
  retention_enabled: true
  retention_delete_delay: 2h
  retention_delete_worker_count: 150

# Built-in ruler — for Grafana-side alerting rules dropped into rules/.
# See teacher/siem/loki/rules/ (not shipped yet; future PR).
ruler:
  alertmanager_url: ""
  enable_api: true
  storage:
    type: local
    local:
      directory: /loki/rules
  rule_path: /loki/rules-temp
  ring:
    kvstore:
      store: inmemory

analytics:
  reporting_enabled: false
