# OTLab — shared ESP32-S3-N16R8 base config.
#
# Included by per-device YAMLs via:
#   packages:
#     base: !include otlab-esp-common.yaml
#
# Per-device YAMLs only need to set:
#   substitutions:
#     name: <unique-hostname>
#     friendly_name: <display name>
#
# Hardware: Lonely Binary ESP32-S3-N16R8 (16 MB flash, 8 MB octal PSRAM)
# - Native USB-CDC available, but board ships with CH340 USB-UART so
#   flashing uses RTS/DTR auto-reset over /dev/ttyUSB0.
# - WS2812 RGB LED on GPIO48 (status indicator)
# - BOOT button on GPIO0

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  comment: "OTLab I/O device — REST + sensors + GPIO over WiFi"
  on_boot:
    priority: -10
    then:
      - logger.log: "OTLab ESP32-S3 booted"

esp32:
  board: esp32-s3-devkitc-1
  flash_size: 16MB
  framework:
    type: esp-idf

psram:
  mode: octal
  speed: 80MHz

logger:
  level: INFO
  baud_rate: 115200

# ESPHome native API — used by ESPHome Dashboard for OTA + monitoring
api:
  encryption:
    key: !secret api_key

# OTA over WiFi (after first USB flash, all updates come via this)
ota:
  - platform: esphome
    password: !secret ota_password

# WiFi join the OT-lab classroom network
# DHCP from TP-Link by default. Use mDNS (${name}.local) to find devices.
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true
  # Fallback AP if WiFi credentials fail — useful for recovery if SSID
  # changes. Connect a phone, browse to 192.168.4.1 to re-configure.
  ap:
    ssid: "${name}-fallback"
    password: !secret ap_password

captive_portal:

# Web UI (live values + REST API) on :80
# REST endpoints auto-generated from sensor/binary_sensor/light/etc IDs:
#   GET  http://<ip>/sensor/uptime
#   GET  http://<ip>/sensor/mcu_temperature
#   POST http://<ip>/light/status_led/turn_on
web_server:
  port: 80
  version: 3
  include_internal: true
  log: false

# RGB status LED — GPIO48 on Lonely Binary ESP32-S3-N16R8
# Note: rmt_channel was removed in ESPHome 2024.x — auto-assigned now.
light:
  - platform: esp32_rmt_led_strip
    rgb_order: GRB
    pin: GPIO48
    num_leds: 1
    chipset: WS2812
    name: "Status LED"
    id: status_led
    default_transition_length: 200ms
    restore_mode: ALWAYS_ON
    effects:
      - random:
      - pulse:

# BOOT button
binary_sensor:
  - platform: gpio
    pin:
      number: GPIO0
      inverted: true
      mode:
        input: true
        pullup: true
    name: "Boot Button"
    filters:
      - delayed_on: 10ms

# Internal stats
sensor:
  - platform: uptime
    name: "Uptime"
    update_interval: 30s
  - platform: wifi_signal
    name: "WiFi RSSI"
    update_interval: 30s
  - platform: internal_temperature
    name: "MCU Temperature"
    update_interval: 60s

text_sensor:
  - platform: version
    name: "ESPHome Version"
  - platform: wifi_info
    ip_address:
      name: "IP Address"
    ssid:
      name: "SSID"
    mac_address:
      name: "MAC Address"

# Web-triggerable restart
button:
  - platform: restart
    name: "Restart"

# ── PLACEHOLDER — add sensors here as you plug them in ─────────────────
#
# Examples (uncomment + adjust pins as needed):
#
# DHT22 temperature + humidity on GPIO4:
#   sensor:
#     - platform: dht
#       model: DHT22
#       pin: GPIO4
#       temperature:
#         name: "Room temperature"
#       humidity:
#         name: "Room humidity"
#       update_interval: 10s
#
# DS18B20 temperature (1-Wire) on GPIO5:
#   one_wire:
#     - platform: gpio
#       pin: GPIO5
#   sensor:
#     - platform: dallas_temp
#       name: "Probe temp"
#       update_interval: 10s
#
# BME280 temperature + pressure + humidity (I2C on GPIO8/9):
#   i2c:
#     sda: GPIO8
#     scl: GPIO9
#     scan: true
#   sensor:
#     - platform: bme280_i2c
#       address: 0x76
#       temperature:
#         name: "BME280 temperature"
#       humidity:
#         name: "BME280 humidity"
#       pressure:
#         name: "BME280 pressure"
#       update_interval: 10s
#
# Generic ADC reading on GPIO1 (e.g. potentiometer):
#   sensor:
#     - platform: adc
#       pin: GPIO1
#       name: "Pot voltage"
#       update_interval: 1s
#
# Relay output on GPIO10:
#   switch:
#     - platform: gpio
#       pin: GPIO10
#       name: "Relay 1"
#       inverted: false
