<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OTLab Status — Maple Ridge Treatment Plant</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header>
    <div class="brand">
      <h1>Maple Ridge Treatment Plant</h1>
      <div class="sub">Springfield Water Authority · OT Lab Status</div>
    </div>
    <div class="meta">
      <span id="updated">connecting…</span>
      <span class="user">user: {{ user }}</span>
    </div>
  </header>

  <main>
    <section class="row">
      <h2>Network</h2>
      <div class="cards" id="row-net"></div>
    </section>

    <section class="row">
      <h2>Process Control (PLCs)</h2>
      <div class="cards" id="row-plc"></div>
    </section>

    <section class="row">
      <h2>System Health</h2>
      <div class="cards" id="row-health"></div>
    </section>

    <section class="row">
      <h2>Honeypot Fabric</h2>
      <div class="cards" id="row-honeypot"></div>
    </section>

    <section class="row">
      <h2>Pcap Captures</h2>
      <div class="captures-panel" id="captures-panel">
        <div class="captures-controls">
          <span class="hint">Capture 60 s of eth0 traffic on a Pi for forensics / teaching.</span>
          <div class="capture-buttons">
            <button class="capture-btn" data-host="softplc-1">Capture softplc-1</button>
            <button class="capture-btn" data-host="softplc-2">Capture softplc-2</button>
            <button class="capture-btn" data-host="honeypot-host">Capture honeypot-host</button>
          </div>
        </div>
        <ul class="captures-list" id="captures-list"></ul>
      </div>
    </section>
  </main>

  <footer>
    <small>polls /api/status every 3s · health every 5s · v2</small>
  </footer>

  <script src="/static/app.js"></script>
</body>
</html>
